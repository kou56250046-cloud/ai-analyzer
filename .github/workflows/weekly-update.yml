name: twice-weekly-news-update

# 月曜・木曜 08:00 JST (= 日曜・水曜 23:00 UTC) にニュースを自動更新する。
# AI不使用 — APIキー・課金口座は一切不要。
# 手動実行ボタンも利用可（workflow_dispatch）。

on:
  schedule:
    - cron: "0 23 * * 0"   # 月曜 08:00 JST（日曜 23:00 UTC）
    - cron: "0 23 * * 3"   # 木曜 08:00 JST（水曜 23:00 UTC）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: RSS 収集（description 含む、AI不使用）
        run: node scripts/fetch_rss.mjs

      - name: ニュース記事整形（AI不使用・キーワード自動分類）
        run: node scripts/update_news.mjs

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news_inbox.json data/news-data.js
          git diff --staged --quiet || (
            git commit -m "chore: ニュース自動更新 $(date -u +%Y-%m-%d)" &&
            git push
          )
          echo "完了"
