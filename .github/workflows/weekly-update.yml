name: weekly-update

# 毎週月曜 09:00 JST (= 00:00 UTC) にRSS見出しを自動収集する。
# 外部AIは使わないため、APIキー・課金口座は不要（課金リスク0）。
# 手動実行も可（workflow_dispatch）。

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect RSS headlines (no AI)
        run: node scripts/fetch_rss.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/news_inbox.json)" ]; then
            git add data/news_inbox.json
            git commit -m "chore: weekly RSS headlines $(date -u +%Y-%m-%d)"
            git push
          else
            echo "変更なし"
          fi
